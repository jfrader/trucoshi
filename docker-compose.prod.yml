name: "trucoshi-${NODE_ENV:-production}"

include:
  - path: docker-compose.networks.yml

services:
  postgres:
    hostname: postgres_trucoshi_prod
    restart: always
    extends:
      file: docker-compose.base.yml
      service: postgres
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
  redis:
    restart: always
    extends:
      file: docker-compose.base.yml
      service: redis
  server:
    restart: always
    build:
      target: runtime
    command: ["node", "bin/trucoshi-server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres_trucoshi_prod:5432/${APP_DB_NAME}?schema=public"
      APP_REDIS_URL: "redis://redis:6379"
      APP_DEBUG_LEVEL: "info"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    extends:
      file: docker-compose.base.yml
      service: server
